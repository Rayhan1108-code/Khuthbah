<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Message</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 600px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        .message-area { margin-top: 20px; min-height: 200px; padding: 15px; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Weekly Message</h1>
        <button onclick="updateDisplay('english')">English</button>
        <button onclick="updateDisplay('arabic')">العربية</button>
        <button onclick="updateDisplay('urdu')">اردو</button>
        <div id="content" class="message-area">Loading...</div>
    </div>

    <script>
        let sheetData = {};

        async function fetchSheet() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTvA3ftahPKidlDQYn7iXa2Q6E8w7xLjHuc4b7KjAwcwYKZLe5Pi6DIbXmGCFWGyYi8YC9PE0_gMac/pub?output=csv'; // <--- PUT YOUR LINK HERE
            const res = await fetch(url);
            const csv = await res.text();
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const values = lines[1].split(',');

            headers.forEach((h, i) => sheetData[h] = (values[i] || "").replace(/^"|"$/g, '').trim());
            updateDisplay('english'); // Default view
        }

        function updateDisplay(lang) {
            let text = sheetData[lang] || "No content available.";
            // This is the magic line that fixes your line breaks!
            document.getElementById('content').innerHTML = text.replace(/###/g, '<br>');
        }

        fetchSheet();
    </script>
</body>
</html>
