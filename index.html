<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Message</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .lang-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; background: #00796b; color: white; }
        #content { 
            white-space: pre-wrap; /* RESPECTS NEW LINES & INDENTS */
            padding: 15px; 
            border: 1px solid #eee; 
            background: #fafafa; 
            min-height: 150px; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Weekly Message</h2>
        <div class="lang-btns">
            <button onclick="updateDisplay('english')">English</button>
            <button onclick="updateDisplay('arabic')">العربية</button>
            <button onclick="updateDisplay('urdu')">اردو</button>
        </div>
        <div id="content" class="message-area">Loading...</div>
    </div>

    <script>
        let jsonData = {};
        async function fetchJSON() {
            try {
                const res = await fetch('https://api.jsonstorage.net/v1/json/f247d79b-11b3-48f6-8d96-24e206ad561d/83a55d13-65bf-466c-81d4-bc36c2c1896a');
                jsonData = await res.json();
                updateDisplay('english');
            } catch(e) { document.getElementById('content').innerText = "Error loading content."; }
        }
        function updateDisplay(lang) {
            document.getElementById('content').innerText = jsonData[lang] || "No content.";
        }
        fetchJSON();
    </script>
</body>
</html>
